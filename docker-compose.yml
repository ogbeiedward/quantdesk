version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: quantdesk-db
    networks:
      - quantdesk-net
    environment:
      POSTGRES_USER: quantdesk
      POSTGRES_PASSWORD: quantdesk
      POSTGRES_DB: quantdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quantdesk-redis
    networks:
      - quantdesk-net
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantdesk-api
    networks:
      - quantdesk-net
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://quantdesk:quantdesk@quantdesk-db:5432/quantdesk
      REDIS_URL: redis://quantdesk-redis:6379/0
      SECRET_KEY: local-dev-secret-123
      CORS_ORIGINS: "*"
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-demo}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: quantdesk-ui
    networks:
      - quantdesk-net
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:

networks:
  quantdesk-net:
    driver: bridge
