version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quantdesk-db
    environment:
      POSTGRES_USER: quantdesk
      POSTGRES_PASSWORD: quantdesk
      POSTGRES_DB: quantdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quantdesk-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantdesk-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://quantdesk:quantdesk@postgres:5432/quantdesk
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantdesk-ui
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
