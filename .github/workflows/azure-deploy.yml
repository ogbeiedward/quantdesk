name: Build and Deploy to Azure Container Registry

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug Environment
        run: |
          echo "Current directory: $(pwd)"
          ls -R

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: quantdeskacrswe9918.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t quantdeskacrswe9918.azurecr.io/quantdesk-api:latest ./backend
          docker push quantdeskacrswe9918.azurecr.io/quantdesk-api:latest

      - name: Build and Push Frontend Image
        run: |
          # Passing the production API URL at build time so Vite can embed it
          docker build \
            --build-arg VITE_API_URL=https://quantdesk-app9918.azurewebsites.net \
            -t quantdeskacrswe9918.azurecr.io/quantdesk-ui:latest ./frontend
          docker push quantdeskacrswe9918.azurecr.io/quantdesk-ui:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'quantdesk-app9918'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'quantdeskacrswe9918.azurecr.io/quantdesk-api:latest,quantdeskacrswe9918.azurecr.io/quantdesk-ui:latest'
