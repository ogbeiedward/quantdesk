name: Build and Deploy to Azure Container Registry

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug Environment
        run: |
          echo "Current directory: $(pwd)"
          ls -R

      - name: Log into Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: quantdeskacrswe9918.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}


      - name: Build and Push Backend Image
        run: |
          docker build -t quantdeskacrswe9918.azurecr.io/quantdesk-api:latest ./backend
          docker push quantdeskacrswe9918.azurecr.io/quantdesk-api:latest

      - name: Build and Push Frontend Image
        run: |
          # Passing the production API URL at build time so Vite can embed it
          docker build \
            --build-arg VITE_API_URL=https://quantdesk-app9918.azurewebsites.net \
            -t quantdeskacrswe9918.azurecr.io/quantdesk-ui:latest ./frontend
          docker push quantdeskacrswe9918.azurecr.io/quantdesk-ui:latest

      - name: Trigger Azure Web App Deployment
        run: |
          curl -X POST "${{ secrets.AZURE_WEBAPP_WEBHOOK_URL }}"

